<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ミッドポイント計算アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <p class="app-badge">Astrology Tool</p>
      <h1>ミッドポイント計算アプリ</h1>
      <p class="description">
        2つの天体の位置から、ミッドポイントを計算します。
      </p>
    </header>

    <!-- 出生図取得セクション -->
    <section class="input-section">
      <h2>出生情報から星周りを取得</h2>

      <label for="birthDate">生年月日</label>
      <input type="date" id="birthDate" />

      <label for="birthTime">出生時刻</label>
      <input type="time" id="birthTime" />

      <label for="birthPlace">出生地</label>
      <input
        type="text"
        id="birthPlace"
        placeholder="例：横浜市、東京都、新宿区 など"
      />

      <div class="button-group">
        <button id="fetchChartButton" type="button">星周りを取得</button>
      </div>

      <p id="chartLoadingMessage" class="loading-message"></p>
      <p id="chartErrorMessage" class="error-message"></p>
    </section>

    <!-- 星周り一覧 -->
    <section class="result-section" id="chartResultSection">
      <h2>取得した星周り</h2>
      <ul id="chartResultList" class="chart-result-list">
        <li>まだ星周りは取得されていません</li>
      </ul>
    </section>

    <!-- 取得結果から選択 -->
    <section class="input-section">
      <h2>取得した星周りから選択</h2>

      <label for="chartTargetA">対象A</label>
      <select id="chartTargetA">
        <option value="">先に星周りを取得してください</option>
      </select>

      <label for="chartTargetB">対象B</label>
      <select id="chartTargetB">
        <option value="">先に星周りを取得してください</option>
      </select>

      <div class="selected-target-box">
        <p id="chartTargetADisplay">対象A：-</p>
        <p id="chartTargetBDisplay">対象B：-</p>
      </div>

      <div class="button-group">
        <button id="calculateFromChartButton" type="button">
          選択した2点でミッドポイントを計算
        </button>
      </div>
    </section>

    <!-- 既存の手入力セクション -->
    <section class="input-section">
      <h2>天体A</h2>

      <label for="planetA">対象</label>
      <select id="planetA">
        <option value="">選択してください</option>
        <option value="sun">太陽</option>
        <option value="moon">月</option>
        <option value="mercury">水星</option>
        <option value="venus">金星</option>
        <option value="jupiter">木星</option>
        <option value="saturn">土星</option>
        <option value="uranus">天王星</option>
        <option value="neptune">海王星</option>
        <option value="pluto">冥王星</option>
        <option value="asc">アセンダント</option>
        <option value="mc">MC</option>
        <option value="node">ノード</option>
      </select>

      <label for="signA">星座</label>
      <select id="signA">
        <option value="">選択してください</option>
        <option value="0">おひつじ座</option>
        <option value="1">おうし座</option>
        <option value="2">ふたご座</option>
        <option value="3">かに座</option>
        <option value="4">しし座</option>
        <option value="5">おとめ座</option>
        <option value="6">てんびん座</option>
        <option value="7">さそり座</option>
        <option value="8">いて座</option>
        <option value="9">やぎ座</option>
        <option value="10">みずがめ座</option>
        <option value="11">うお座</option>
      </select>

      <div class="degree-row">
        <div>
          <label for="degreeA">度</label>
          <input type="number" id="degreeA" min="0" max="29" placeholder="0〜29" />
        </div>

        <div>
          <label for="minuteA">分</label>
          <input type="number" id="minuteA" min="0" max="59" placeholder="0〜59" />
        </div>
      </div>
    </section>

    <section class="input-section">
      <h2>天体B</h2>

      <label for="planetB">対象</label>
      <select id="planetB">
        <option value="">選択してください</option>
        <option value="sun">太陽</option>
        <option value="moon">月</option>
        <option value="mercury">水星</option>
        <option value="venus">金星</option>
        <option value="jupiter">木星</option>
        <option value="saturn">土星</option>
        <option value="uranus">天王星</option>
        <option value="neptune">海王星</option>
        <option value="pluto">冥王星</option>
        <option value="asc">アセンダント</option>
        <option value="mc">MC</option>
        <option value="node">ノード</option>
      </select>

      <label for="signB">星座</label>
      <select id="signB">
        <option value="">選択してください</option>
        <option value="0">おひつじ座</option>
        <option value="1">おうし座</option>
        <option value="2">ふたご座</option>
        <option value="3">かに座</option>
        <option value="4">しし座</option>
        <option value="5">おとめ座</option>
        <option value="6">てんびん座</option>
        <option value="7">さそり座</option>
        <option value="8">いて座</option>
        <option value="9">やぎ座</option>
        <option value="10">みずがめ座</option>
        <option value="11">うお座</option>
      </select>

      <div class="degree-row">
        <div>
          <label for="degreeB">度</label>
          <input type="number" id="degreeB" min="0" max="29" placeholder="0〜29" />
        </div>

        <div>
          <label for="minuteB">分</label>
          <input type="number" id="minuteB" min="0" max="59" placeholder="0〜59" />
        </div>
      </div>
    </section>

    <div class="button-group">
      <button id="calculateButton">ミッドポイントを計算</button>
      <button id="resetButton" type="button" class="secondary-button">入力をリセット</button>
    </div>

    <section class="result-section">
      <div class="result-header">
        <h2>計算結果</h2>
        <button id="copyResultButton" type="button" class="copy-button">結果をコピー</button>
      </div>

      <p id="planetAResult">天体A：-</p>
      <p id="planetBResult">天体B：-</p>
      <p id="midpointResult">ミッドポイント：-</p>
      <p id="sort45Result">45度ソート：-</p>

      <details class="detail-box">
        <summary>90度ソートの4候補を見る</summary>
        <ul id="sort90List" class="candidate-list">
          <li>-</li>
        </ul>
      </details>

      <details class="detail-box">
        <summary>45度ソートの4候補を見る</summary>
        <ul id="sort45List" class="candidate-list">
          <li>-</li>
        </ul>
      </details>

      <p id="copyMessage" class="copy-message"></p>
    </section>

    <p id="errorMessage" class="error-message"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
